version: '3'

services:
  nzbhydra:
    image: linuxserver/nzbhydra2:latest
    container_name: nzbhydra
    hostname: nzbhydra
    ports:
      - ${APP_PORT}:5076
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${ROOT_FOLDER_HOST}/media/usenet/watch:/media/usenet/watch
      - ${ROOT_FOLDER_HOST}/media/usenet/torrents:/media/torrents/watch
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    restart: unless-stopped
    networks:
      - tipi_main_network
    labels:
      # Main
      traefik.enable: true
      traefik.http.middlewares.sabnzbd-web-redirect.redirectscheme.scheme: https
      traefik.http.services.sabnzbd.loadbalancer.server.port: 5076
      # Web
      traefik.http.routers.sabnzbd-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.sabnzbd-insecure.entrypoints: web
      traefik.http.routers.sabnzbd-insecure.service: nzbhydra
      traefik.http.routers.sabnzbd-insecure.middlewares: nzbhydra-web-redirect
      # Websecure
      traefik.http.routers.sabnzbd.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.sabnzbd.entrypoints: websecure
      traefik.http.routers.sabnzbd.service: nzbhydra
      traefik.http.routers.sabnzbd.tls.certresolver: myresolver
      # Local domain
      traefik.http.routers.sabnzbd-local-insecure.rule: Host(`nzbhydra.${LOCAL_DOMAIN}`)
      traefik.http.routers.sabnzbd-local-insecure.entrypoints: web
      traefik.http.routers.sabnzbd-local-insecure.service: nzbhydra
      traefik.http.routers.sabnzbd-local-insecure.middlewares: nzbhydra-web-redirect
      # Local domain secure
      traefik.http.routers.sabnzbd-local.rule: Host(`nzbhydra.${LOCAL_DOMAIN}`)
      traefik.http.routers.sabnzbd-local.entrypoints: websecure
      traefik.http.routers.sabnzbd-local.service: nzbhydra
      traefik.http.routers.sabnzbd-local.tls: true
      runtipi.managed: true