services:
  log:
    image: goharbor/harbor-log:v2.12.2
    container_name: harbor-log
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - /var/log/harbor/:/var/log/docker/:z
      - ${APP_DATA_DIR}/data/common/config/log/logrotate.conf:/etc/logrotate.d/logrotate.conf
      - ${APP_DATA_DIR}/data/common/config/log/rsyslog_docker.conf:/etc/rsyslog.d/rsyslog_docker.conf
    ports:
      - 127.0.0.1:1514:10514
    networks:
      - harbor
  registry:
    image: goharbor/registry-photon:v2.12.2
    container_name: registry
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${APP_DATA_DIR}/data/data/registry:/storage:z
      - ${APP_DATA_DIR}/data/common/config/registry/:/etc/registry/:z
      - ${APP_DATA_DIR}/data/data/secret/registry/root.crt:/etc/registry/root.crt
      - ${APP_DATA_DIR}/data/common/config/shared/trust-certificates:/harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "registry"
  registryctl:
    image: goharbor/harbor-registryctl:v2.12.2
    container_name: registryctl
    restart: always
    environment:
      - CORE_SECRET=${CORE_SECRET}
      - JOBSERVICE_SECRET=${JOBSERVICE_SECRET}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${APP_DATA_DIR}/data/data/registry:/storage:z
      - ${APP_DATA_DIR}/data/common/config/registry/:/etc/registry/:z
      - ${APP_DATA_DIR}/data/common/config/registryctl/config.yml:/etc/registryctl/config.yml
      - ${APP_DATA_DIR}/data/common/config/shared/trust-certificates:/harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "registryctl"
  postgresql:
    image: goharbor/harbor-db:v2.12.2
    container_name: harbor-db
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - ${APP_DATA_DIR}/data/data${APP_DATA_DIR}/data/database:/var/lib/postgresql${APP_DATA_DIR}/data/data:z
    networks:
      harbor:
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "postgresql"
    shm_size: '1gb'
  core:
    image: goharbor/harbor-core:v2.12.2
    container_name: harbor-core
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - ${APP_DATA_DIR}/data/data/ca_download/:/etc/core/ca/:z
      - ${APP_DATA_DIR}/data/data/:${APP_DATA_DIR}/data/data/:z
      - ${APP_DATA_DIR}/data/common/config/core/certificates/:/etc/core/certificates/:z
      - ${APP_DATA_DIR}/data/common/config/core/app.conf:/etc/core/app.conf
      - ${APP_DATA_DIR}/data/data/secret/core/private_key.pem:/etc/core/private_key.pem
      - ${APP_DATA_DIR}/data/data/secret/keys/secretkey:/etc/core/key
      - ${APP_DATA_DIR}/data/common/config/shared/trust-certificates:/harbor_cust_cert
    networks:
      harbor:
    depends_on:
      - log
      - registry
      - redis
      - postgresql
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "core"
  portal:
    image: goharbor/harbor-portal:v2.12.2
    container_name: harbor-portal
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - HARBOR_ADMIN_PASSWORD=${HARBOR_ADMIN_PASSWORD}
      - CORE_SECRET=${CORE_SECRET}
      - JOBSERVICE_SECRET=${JOBSERVICE_SECRET}
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=${REGISTRY_CREDENTIAL_PASSWORD}
      - CSRF_KEY=${CSRF_KEY}
      - ROBOT_SCANNER_NAME_PREFIX=${ROBOT_SCANNER_NAME_PREFIX}
      - WITH_TRIVY=True
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ${APP_DATA_DIR}/data/common/config/portal/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - harbor
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "portal"
  jobservice:
    image: goharbor/harbor-jobservice:v2.12.2
    container_name: harbor-jobservice
    restart: always
    environment:
      - CORE_SECRET=${CORE_SECRET}
      - JOBSERVICE_SECRET=${JOBSERVICE_SECRET}
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=${REGISTRY_CREDENTIAL_PASSWORD}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${APP_DATA_DIR}/data/data/job_logs:/var/log/jobs:z
      - ${APP_DATA_DIR}/data/common/config/jobservice/config.yml:/etc/jobservice/config.yml
      - ${APP_DATA_DIR}/data/common/config/shared/trust-certificates:/harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - core
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "jobservice"
  redis:
    image: goharbor/redis-photon:v2.12.2
    container_name: redis
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - ${APP_DATA_DIR}/data/data/redis:/var/lib/redis
    networks:
      harbor:
    depends_on:
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "redis"
  proxy:
    image: goharbor/nginx-photon:v2.12.2
    container_name: nginx
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - ${APP_DATA_DIR}/data/common/config/nginx:/etc/nginx:z
      - ${APP_DATA_DIR}/data/common/config/shared/trust-certificates:/harbor_cust_cert
    networks:
      - harbor
      - tipi_main_network
    labels:
      # Main
      traefik.enable: true
      traefik.http.middlewares.sabnzbd-web-redirect.redirectscheme.scheme: https
      traefik.http.services.sabnzbd.loadbalancer.server.port: 80
      # Web
      traefik.http.routers.sabnzbd-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.sabnzbd-insecure.entrypoints: web
      traefik.http.routers.sabnzbd-insecure.service: nginx
      traefik.http.routers.sabnzbd-insecure.middlewares: nginx-web-redirect
      # Websecure
      traefik.http.routers.sabnzbd.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.sabnzbd.entrypoints: websecure
      traefik.http.routers.sabnzbd.service: nginx
      traefik.http.routers.sabnzbd.tls.certresolver: myresolver
      # Local domain
      traefik.http.routers.sabnzbd-local-insecure.rule: Host(`nginx.${LOCAL_DOMAIN}`)
      traefik.http.routers.sabnzbd-local-insecure.entrypoints: web
      traefik.http.routers.sabnzbd-local-insecure.service: nginx
      traefik.http.routers.sabnzbd-local-insecure.middlewares: nginx-web-redirect
      # Local domain secure
      traefik.http.routers.sabnzbd-local.rule: Host(`nginx.${LOCAL_DOMAIN}`)
      traefik.http.routers.sabnzbd-local.entrypoints: websecure
      traefik.http.routers.sabnzbd-local.service: nginx
      traefik.http.routers.sabnzbd-local.tls: true
      runtipi.managed: true
    ports:
      - ${APP_PORT}:8080
    depends_on:
      - registry
      - core
      - portal
      - log
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "proxy"
  trivy-adapter:
    container_name: trivy-adapter
    image: goharbor/trivy-adapter-photon:v2.12.2
    restart: always
    cap_drop:
      - ALL
    depends_on:
      - log
      - redis
    networks:
      - harbor
    volumes:
      - ${APP_DATA_DIR}/data/data/trivy-adapter/trivy:/home/scanner/.cache/trivy
      - ${APP_DATA_DIR}/data/data/trivy-adapter/reports:/home/scanner/.cache/reports
      - ${APP_DATA_DIR}/data/common/config/shared/trust-certificates:/harbor_cust_cert
    logging:
      driver: "syslog"
      options:
        syslog-address: "tcp://localhost:1514"
        tag: "trivy-adapter"
networks:
  harbor:
    external: false
